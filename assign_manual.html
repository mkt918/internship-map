<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>インターンシップ 手動配置ツール</title>
<style>
:root {
  --bg:#f0f2f5; --surface:#ffffff; --surface2:#f5f7fa; --border:#dde1ea;
  --text:#1a1d2e; --dim:#6b7280; --accent:#3b6be8;
  --c-hoiku:#16a34a; --c-ko:#dc2626; --c-food:#d97706;
  --c-butsu:#2563eb; --c-beauty:#c026d3; --c-hanbai:#7c3aed; --c-other:#6b7280;
  --m0:#16a34a; --m1:#ca8a04; --m2:#ea580c; --m3:#dc2626;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo','Yu Gothic UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}

/* Header */
header{background:#fff;border-bottom:2px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:14px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
header h1{font-size:15px;font-weight:800;white-space:nowrap;color:var(--accent)}
.hstats{display:flex;gap:16px;color:var(--dim);font-size:12px}
.hstats b{color:var(--text);font-weight:700}
.hbtns{margin-left:auto;display:flex;gap:6px;align-items:center}
button{padding:5px 12px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:filter .1s}
button:hover{filter:brightness(.93)}
.btn-p{background:var(--accent);color:#fff}
.btn-s{background:#e8edf5;color:var(--text)}
.btn-d{background:#fee2e2;color:#991b1b}

/* Layout */
.panels{display:flex;flex:1;overflow:hidden}
.panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.panel:last-child{border-right:none}
#pC{width:260px;flex-shrink:0;background:#fafbfc}
#pA{flex:1;background:var(--bg)}
#pS{width:280px;flex-shrink:0;background:#fafbfc}
.ph{padding:9px 10px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0}
.ph h2{font-size:11px;font-weight:700;margin-bottom:7px;color:var(--dim);text-transform:uppercase;letter-spacing:.04em}
.pb{flex:1;overflow-y:auto;padding:6px}
select,input[type=text]{background:#fff;color:var(--text);border:1px solid var(--border);border-radius:5px;padding:4px 7px;font-size:11px;font-family:inherit;cursor:pointer;outline:none}
select:focus,input:focus{border-color:var(--accent)}
.frow{display:flex;gap:5px;flex-wrap:wrap}

/* Category colors */
.cd-hoiku{background:var(--c-hoiku)} .cd-ko{background:var(--c-ko)} .cd-food{background:var(--c-food)}
.cd-butsu{background:var(--c-butsu)} .cd-beauty{background:var(--c-beauty)} .cd-hanbai{background:var(--c-hanbai)} .cd-other{background:var(--c-other)}

/* Company cards */
.cc{padding:8px 10px;border-radius:7px;margin-bottom:3px;cursor:pointer;border-left:3px solid transparent;background:#fff;transition:background .1s;border:1px solid var(--border)}
.cc:hover{background:#eef2fb}
.cc.sel{background:#dbe8ff;border-left-color:var(--accent);border-color:#b3ccff}
.cc-top{display:flex;align-items:center;gap:6px}
.cno{font-size:10px;font-weight:800;padding:2px 5px;border-radius:3px;background:#e8edf5;color:var(--dim);white-space:nowrap}
.cname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:var(--text)}
.cc-bot{display:flex;align-items:center;gap:5px;margin-top:4px}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ccat{font-size:10px;color:var(--dim);flex:1}
.cap-ct{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:auto;white-space:nowrap}
.ok{background:#dcfce7;color:#15803d}
.warn{background:#fef9c3;color:#a16207}
.full{background:#fee2e2;color:#b91c1c}

/* Assign board */
.no-sel{display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:14px}
.ab{padding:14px;height:100%;overflow-y:auto}
.comp-hdr{background:#fff;border-radius:8px;padding:12px 16px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.comp-hdr h2{font-size:15px;font-weight:700;margin-bottom:6px;color:var(--text)}
.comp-meta{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--dim)}
.comp-meta span b{color:var(--text)}
.dtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.dtab{padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;border:2px solid var(--border);background:#fff;transition:all .1s;color:var(--text)}
.dtab:hover{border-color:#93c5fd;background:#eff6ff}
.dtab.act{border-color:var(--accent);background:#dbe8ff;color:var(--accent)}
.dtab .sc{font-size:10px;margin-left:4px;font-weight:400}
.slot-area{background:#fff;border-radius:8px;border:1px solid var(--border);padding:12px;min-height:90px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.slot-area h3{font-size:11px;font-weight:700;color:var(--dim);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
.sgrid{display:flex;flex-wrap:wrap;gap:6px}
.astu{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;background:#f5f7fa;font-size:12px;cursor:pointer;border:1px solid var(--border);transition:all .1s}
.astu:hover{border-color:#fca5a5;background:#fff5f5}
.astu .mi{font-size:14px}
.eslot{padding:5px 10px;border-radius:6px;border:1px dashed #cbd5e1;font-size:11px;color:#cbd5e1;background:#fafbfc}
.no-date{color:var(--dim);font-size:12px;padding:24px;text-align:center}
.hint{font-size:11px;color:var(--dim);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}

/* Student cards */
.sc-card{padding:8px 10px;border-radius:7px;margin-bottom:3px;cursor:pointer;background:#fff;border:1px solid var(--border);border-left:3px solid transparent;transition:background .1s}
.sc-card:hover:not(.asgnd){background:#f0f4ff}
.sc-card.asgnd{opacity:.4;cursor:default}
.sc-card.m0{border-left-color:var(--m0)}
.sc-card.m1{border-left-color:var(--m1)}
.sc-card.m2{border-left-color:var(--m2)}
.sc-card.m3{border-left-color:var(--m3)}
.sc-top{display:flex;align-items:center;gap:5px}
.sid{font-size:10px;font-weight:700;color:var(--dim)}
.sgbadge{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600}
.gf{background:#fce7f3;color:#be185d}
.gm{background:#dbeafe;color:#1d4ed8}
.mbadge{margin-left:auto;font-size:14px}
.sc-bot{margin-top:3px;font-size:11px;color:var(--dim)}
.pchips{margin-top:3px;display:flex;gap:3px;flex-wrap:wrap}
.pchip{padding:1px 6px;border-radius:3px;font-size:10px;background:#f0f2f5;color:var(--dim);border:1px solid var(--border)}
.asgnd-to{font-size:10px;color:var(--m0);margin-top:2px;font-weight:600}
.station-hdr{font-size:11px;font-weight:700;color:var(--accent);padding:7px 4px 3px;margin-top:8px;border-bottom:2px solid #dbe8ff}.station-hdr:first-child{margin-top:0}.station-hdr span{font-weight:400;color:var(--dim);margin-left:4px}

/* Scrollbar */
::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* Overlay */
#overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px;backdrop-filter:blur(4px)}
#overlay h2{font-size:20px;color:#fff}
#overlay p{color:#cbd5e1;font-size:13px}
.file-inputs{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.file-box{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px 20px;text-align:center;min-width:190px;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.file-box h3{font-size:13px;margin-bottom:10px;color:var(--text)}
.file-box input[type=file]{font-size:11px;color:var(--dim);width:100%}
.or-sep{color:#cbd5e1;font-size:12px}
.toast{position:fixed;bottom:18px;right:18px;padding:10px 18px;background:#fff;border:1px solid var(--border);border-radius:8px;font-size:12px;z-index:300;animation:fin .2s ease;box-shadow:0 4px 12px rgba(0,0,0,.12)}
@keyframes fin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<header>
  <h1>📋 インターンシップ 手動配置ツール</h1>
  <div class="hstats">
    <span>配置済 <b id="st-done">0</b>/144</span>
    <span>未配置 <b id="st-left">144</b></span>
    <span>✅ <b id="st-m0">0</b></span>
    <span>⭕ <b id="st-m12">0</b></span>
    <span>🔴 <b id="st-m3">0</b></span>
  </div>
  <div class="hbtns">
    <button class="btn-s" id="btnLoad">📂 CSVを再読み込み</button>
    <button class="btn-s" id="btnLoadAssign">📥 既存配置を読み込む</button>
    <button class="btn-d" id="btnClear">🗑 配置をクリア</button>
    <button class="btn-p" id="btnExport">💾 配置CSVを出力</button>
  </div>
</header>

<div class="panels">
  <!-- Left: Company list -->
  <div class="panel" id="pC">
    <div class="ph">
      <h2>事業所一覧（<span id="comp-count">0</span>社）</h2>
      <div class="frow">
        <select id="fCat" style="flex:1">
          <option value="">全業種</option>
          <option value="保育">保育</option>
          <option value="製造工業">製造工業</option>
          <option value="製造食品">製造食品</option>
          <option value="物流">物流</option>
          <option value="美容">美容</option>
          <option value="販売">販売</option>
        </select>
        <select id="fGrade">
          <option value="">全学年</option>
          <option value="1">1年のみ</option>
          <option value="2">2年のみ</option>
        </select>
      </div>
    </div>
    <div class="pb" id="compList"></div>
  </div>

  <!-- Center: Assignment board -->
  <div class="panel" id="pA">
    <div id="noSel" class="no-sel">← 事業所を選択してください</div>
    <div id="assignBoard" class="ab" style="display:none"></div>
  </div>

  <!-- Right: Student list -->
  <div class="panel" id="pS">
    <div class="ph">
      <h2>生徒一覧（<span id="stu-count">0</span>名）</h2>
      <div class="frow">
        <select id="fGr" style="width:70px">
          <option value="">全学年</option>
          <option value="1">1年</option>
          <option value="2">2年</option>
        </select>
        <select id="fCls" style="width:60px">
          <option value="">全組</option>
        </select>
        <select id="fStat">
          <option value="all">全員</option>
          <option value="unassigned">未配置</option>
          <option value="assigned">配置済</option>
        </select>
      </div>
      <div class="frow" style="margin-top:5px">
        <select id="fMatch">
          <option value="all">全マッチ</option>
          <option value="0">✅ 第1希望一致</option>
          <option value="12">⭕ 第2〜3希望</option>
          <option value="3">🔴 不一致</option>
        </select>
        <select id="fSort">
          <option value="match">マッチ順</option>
          <option value="grade">学年順</option>
          <option value="station">最寄り駅順</option>
        </select>
      </div>
    </div>
    <div class="pb" id="stuList"></div>
  </div>
</div>

<!-- Overlay: Load CSVs -->
<div id="overlay">
  <h2>📂 CSVファイルを読み込む</h2>
  <p>企業マスターDB.csv と 生徒名簿DB.csv をアップロードするか、GitHubから自動取得します。</p>
  <div class="file-inputs">
    <div class="file-box">
      <h3>企業マスターDB.csv</h3>
      <input type="file" id="fComp" accept=".csv">
    </div>
    <div class="file-box">
      <h3>生徒名簿DB.csv</h3>
      <input type="file" id="fStu" accept=".csv">
    </div>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <button class="btn-p" id="btnUpload">📤 アップロードして開始</button>
    <span class="or-sep">または</span>
    <button class="btn-s" id="btnFetch">🌐 同じフォルダから自動読み込み</button>
  </div>
  <p id="overlay-msg" style="color:#ff9f43;font-size:12px;min-height:1em"></p>
</div>

<script>
'use strict';
// ─── Data ───────────────────────────────────────────────────────────────────
let companies = {};   // { no: { No, 企業名, 業種カテゴリ, ... dailyCap, dates[] } }
let students  = {};   // { id: { 学年, 組, 番号, 性別, pref1, pref2, pref3, 最寄り駅, 市町 } }
let assign    = {};   // { studentId: { compNo, date, matchLv } }
let selComp   = null;
let selDate   = null;

// ─── Category helpers ────────────────────────────────────────────────────────
const catClass = {
  '保育':'hoiku','製造工業':'ko','製造食品':'food',
  '物流':'butsu','美容':'beauty','販売':'hanbai'
};
function catCls(c){ return 'cd-' + (catClass[c]||'other'); }
function catColor(c){ return 'var(--c-' + (catClass[c]||'other') + ')'; }

// Match level: 0=✅first, 1=⭕2nd, 2=⭕3rd, 3=🔴none
function matchLevel(stu, comp){
  const cc = comp.業種カテゴリ;
  if(!cc) return 3;
  if(stu.pref1 && catMatchesCat(stu.pref1, cc)) return 0;
  if(stu.pref2 && catMatchesCat(stu.pref2, cc)) return 1;
  if(stu.pref3 && catMatchesCat(stu.pref3, cc)) return 2;
  return 3;
}
function catMatchesCat(a, b){
  if(a===b) return true;
  // Both 製造X match each other
  if(a.startsWith('製造') && b.startsWith('製造')) return true;
  return false;
}
const matchIcon = ['✅','⭕','⭕','🔴'];
const matchCls  = ['m0','m1','m2','m3'];

function parseCap(text){
  if(!text) return 2;
  const t = text.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0)-0xFEE0));
  const m = t.match(/(\d+)\s*[名人]/);
  return m ? parseInt(m[1]) : 2;
}

function parseDates(text){
  if(!text) return [];
  return text.split(';').map(s=>s.trim()).filter(Boolean);
}

// ─── CSV parser (handles multi-line quoted fields) ───────────────────────────
function parseCSV(text){
  const rows=[];
  let row=[], cell='', inQ=false;
  const t=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  for(let i=0;i<t.length;i++){
    const c=t[i];
    if(inQ){
      if(c==='"'){ if(t[i+1]==='"'){cell+='"';i++;}else{inQ=false;} }
      else{ cell+=c; }
    } else {
      if(c==='"'){ inQ=true; }
      else if(c===','){ row.push(cell); cell=''; }
      else if(c==='\n'){ row.push(cell); cell=''; if(row.some(v=>v.trim())) rows.push(row); row=[]; }
      else{ cell+=c; }
    }
  }
  if(cell||row.length){ row.push(cell); if(row.some(v=>v.trim())) rows.push(row); }
  return rows;
}
function csvToObjects(text){
  const rows=parseCSV(text);
  if(rows.length<2) return [];
  const hdr=rows[0];
  return rows.slice(1).map(r=>{
    const o={};
    hdr.forEach((h,i)=>o[h]=r[i]||'');
    return o;
  });
}

// ─── Load data ───────────────────────────────────────────────────────────────
function loadCompanies(text){
  const rows = csvToObjects(text);
  companies = {};
  rows.forEach(r=>{
    if(!r['No']) return;
    const no = r['No'].trim();
    const dates = parseDates(r['受入可能日程']);
    const dailyCap = parseCap(r['受け入れ人数の説明']);
    companies[no] = { ...r, No:no, dailyCap, dates };
  });
}

function loadStudents(text){
  const rows = csvToObjects(text);
  students = {};
  rows.forEach(r=>{
    const g=r['学年'],cl=r['組'],n=r['番号'];
    if(!g||!cl||!n) return;
    const id=`${g}-${cl}-${n}`;
    students[id] = {
      ...r, id,
      pref1: r['第1希望業種']||'',
      pref2: r['第2希望業種']||'',
      pref3: r['第3希望業種']||'',
    };
  });
}

function loadAssignments(text){
  const rows = csvToObjects(text);
  assign = {};
  rows.forEach(r=>{
    const g=r['学年'],cl=r['組'],n=r['番号'],compNo=r['配属企業No'],date=r['日付'];
    if(!g||!cl||!n||!compNo) return;
    const id=`${g}-${cl}-${n}`;
    const stu=students[id], comp=companies[compNo];
    const ml = (stu&&comp) ? matchLevel(stu,comp) : 3;
    assign[id] = { compNo, date:(date||''), matchLv:ml };
  });
}

// ─── Render helpers ──────────────────────────────────────────────────────────
function getCompAssignCount(no){
  return Object.values(assign).filter(a=>a.compNo===no).length;
}
function getDateCount(no, date){
  return Object.values(assign).filter(a=>a.compNo===no && a.date===date).length;
}
function slotClass(filled, cap){
  if(filled>=cap) return 'full';
  if(filled>=cap*0.7) return 'warn';
  return 'ok';
}

// ─── Render company list ─────────────────────────────────────────────────────
function renderCompList(){
  const catF = document.getElementById('fCat').value;
  const grF  = document.getElementById('fGrade').value;
  const el   = document.getElementById('compList');

  const list = Object.values(companies).filter(c=>{
    if(catF && c['業種カテゴリ'] !== catF) return false;
    if(grF==='1' && c['受入_1年']!=='Y') return false;
    if(grF==='2' && c['受入_2年']!=='Y') return false;
    return true;
  });

  document.getElementById('comp-count').textContent = list.length;

  el.innerHTML = list.map(c=>{
    const no = c.No;
    const cat = c['業種カテゴリ']||'';
    const filled = getCompAssignCount(no);
    const totalCap = c.dailyCap * Math.max(1, c.dates.length);
    const sc = slotClass(filled, totalCap);
    const dotCls = catCls(cat);
    const isSel = selComp===no;
    const grades = [c['受入_1年']==='Y'?'1年':'', c['受入_2年']==='Y'?'2年':''].filter(Boolean).join('/');
    return `<div class="cc${isSel?' sel':''}" data-no="${no}" onclick="selectComp('${no}')">
      <div class="cc-top">
        <span class="cno">${no}</span>
        <span class="cname" title="${c['企業名']}">${c['企業名'].replace('株式会社','(株)').replace('有限会社','(有)').substring(0,20)}</span>
      </div>
      <div class="cc-bot">
        <div class="cdot ${dotCls}"></div>
        <span class="ccat">${cat}</span>
        <span style="font-size:10px;color:var(--dim)">${grades}</span>
        <span class="cap-ct ${sc}">${filled}/${totalCap}</span>
      </div>
    </div>`;
  }).join('');
}

// ─── Render assign board ─────────────────────────────────────────────────────
function renderAssignBoard(){
  const noSel = document.getElementById('noSel');
  const board = document.getElementById('assignBoard');
  if(!selComp || !companies[selComp]){
    noSel.style.display='flex'; board.style.display='none'; return;
  }
  noSel.style.display='none'; board.style.display='block';

  const c = companies[selComp];
  const cat = c['業種カテゴリ']||'';
  const grades = [c['受入_1年']==='Y'?'1年':'', c['受入_2年']==='Y'?'2年':''].filter(Boolean).join('・');

  // Date tabs
  const dateTabs = c.dates.map(d=>{
    const cnt = getDateCount(selComp, d);
    const sc  = slotClass(cnt, c.dailyCap);
    return `<div class="dtab${selDate===d?' act':''}" onclick="selectDate('${d}')">
      ${d}<span class="sc ${sc}">${cnt}/${c.dailyCap}</span>
    </div>`;
  }).join('');

  // Slot area
  let slotHTML = '';
  if(!selDate){
    slotHTML = `<div class="no-date">上の日付タブを選択してください</div>`;
  } else {
    const cnt = getDateCount(selComp, selDate);
    const cap = c.dailyCap;
    const assigned = Object.entries(assign)
      .filter(([,a])=>a.compNo===selComp && a.date===selDate)
      .map(([id,a])=>{
        const stu = students[id];
        if(!stu) return '';
        const ml = a.matchLv;
        return `<div class="astu" onclick="unassignStudent('${id}')" title="クリックで解除">
          <span class="mi">${matchIcon[ml]}</span>
          <span>${stu['学年']}年${stu['組']}組${stu['番号']}番</span>
          <span style="color:var(--dim);font-size:10px">${stu['最寄り駅']||stu['市町']||''}</span>
          <span style="color:var(--dim);font-size:10px">✕</span>
        </div>`;
      }).join('');
    const empty = Array.from({length:Math.max(0,cap-cnt)},()=>`<div class="eslot">空き</div>`).join('');
    slotHTML = `<div class="sgrid">${assigned}${empty}</div>`;
  }

  board.innerHTML = `
    <div class="comp-hdr">
      <h2><span style="color:${catColor(cat)};margin-right:6px">●</span>${c['企業名']}</h2>
      <div class="comp-meta">
        <span>業種 <b>${cat}</b></span>
        <span>1日定員 <b>${c.dailyCap}名</b></span>
        <span>受入学年 <b>${grades||'不明'}</b></span>
        <span>定員説明 <b>${c['受け入れ人数の説明']||'-'}</b></span>
        <span>アクセス <b>${(c['アクセス']||'-').substring(0,30)}</b></span>
        ${c['特記事項']?`<span style="color:var(--m2)">⚠ ${c['特記事項'].substring(0,40)}</span>`:''}
      </div>
    </div>
    <div class="dtabs">${dateTabs||'<span style="color:var(--dim)">日程なし</span>'}</div>
    <div class="slot-area">
      <h3>${selDate ? `${selDate} の配置状況` : '日付を選択'}</h3>
      ${slotHTML}
    </div>
    <div class="hint">💡 右パネルで生徒をクリックすると選択中の日付に配置 ／ 配置済み生徒をクリックで解除</div>`;
}

// ─── Render student list ─────────────────────────────────────────────────────
function renderStuList(){
  const grF   = document.getElementById('fGr').value;
  const clF   = document.getElementById('fCls').value;
  const stF   = document.getElementById('fStat').value;
  const mF    = document.getElementById('fMatch').value;
  const sortF = document.getElementById('fSort').value;
  const el    = document.getElementById('stuList');
  const comp  = selComp ? companies[selComp] : null;

  let list = Object.values(students).filter(s=>{
    if(grF && s['学年']!==grF) return false;
    if(clF && s['組']!==clF) return false;
    if(stF==='assigned'   && !assign[s.id]) return false;
    if(stF==='unassigned' &&  assign[s.id]) return false;
    if(comp){
      const ml=matchLevel(s,comp);
      if(mF==='0' && ml!==0) return false;
      if(mF==='12' && ml!==1 && ml!==2) return false;
      if(mF==='3' && ml!==3) return false;
    }
    return true;
  });

  // Sort
  const gradeKey = s=>`${s['学年']}-${s['組']}-${String(s['番号']).padStart(3,'0')}`;
  list.sort((a,b)=>{
    if(sortF==='grade') return gradeKey(a).localeCompare(gradeKey(b));
    if(sortF==='station'){
      const sa=a['最寄り駅']||a['市町']||'', sb=b['最寄り駅']||b['市町']||'';
      if(sa!==sb) return sa.localeCompare(sb,'ja');
      return gradeKey(a).localeCompare(gradeKey(b));
    }
    // match order
    const ma = comp?matchLevel(a,comp):3, mb = comp?matchLevel(b,comp):3;
    if(ma!==mb) return ma-mb;
    return gradeKey(a).localeCompare(gradeKey(b));
  });

  document.getElementById('stu-count').textContent = list.length;

  function stuCard(s){
    const isAsgnd = !!assign[s.id];
    const ml = comp ? matchLevel(s,comp) : -1;
    const mlCls = ml>=0 ? matchCls[ml] : '';
    const icon  = ml>=0 ? matchIcon[ml] : '';
    const gCls  = s['性別']==='女'?'gf':'gm';
    const prefs = [s.pref1,s.pref2,s.pref3].filter(Boolean);
    const a = assign[s.id];
    const aInfo = a ? `<div class="asgnd-to">✅ ${a.compNo} / ${a.date||'日付未設定'}</div>` : '';
    return `<div class="sc-card${isAsgnd?' asgnd':''} ${mlCls}" data-id="${s.id}" onclick="clickStudent('${s.id}')">
      <div class="sc-top">
        <span class="sid">${s['学年']}年${s['組']}組${s['番号']}番</span>
        <span class="sgbadge ${gCls}">${s['性別']}</span>
        ${icon?`<span class="mbadge">${icon}</span>`:''}
      </div>
      <div class="sc-bot">
        ${sortF!=='station'?`<div>${s['最寄り駅']||s['市町']||''}</div>`:''}
        <div class="pchips">${prefs.map(p=>`<span class="pchip">${p}</span>`).join('')}</div>
        ${aInfo}
      </div>
    </div>`;
  }

  if(sortF==='station'){
    // Group by station with headers
    let html='', lastSt='';
    list.forEach(s=>{
      const st=s['最寄り駅']||s['市町']||'不明';
      if(st!==lastSt){
        const cnt=list.filter(x=>(x['最寄り駅']||x['市町']||'不明')===st).length;
        html+=`<div class="station-hdr">${st} <span>${cnt}名</span></div>`;
        lastSt=st;
      }
      html+=stuCard(s);
    });
    el.innerHTML=html;
  } else {
    el.innerHTML=list.map(stuCard).join('');
  }
}

// ─── Stats ───────────────────────────────────────────────────────────────────
function updateStats(){
  const all = Object.keys(students).length;
  const done= Object.keys(assign).length;
  const m0  = Object.values(assign).filter(a=>a.matchLv===0).length;
  const m12 = Object.values(assign).filter(a=>a.matchLv===1||a.matchLv===2).length;
  const m3  = Object.values(assign).filter(a=>a.matchLv===3).length;
  document.getElementById('st-done').textContent=done;
  document.getElementById('st-left').textContent=all-done;
  document.getElementById('st-m0').textContent=m0;
  document.getElementById('st-m12').textContent=m12;
  document.getElementById('st-m3').textContent=m3;
}

// ─── Actions ─────────────────────────────────────────────────────────────────
function selectComp(no){
  selComp = no;
  selDate = null;
  renderAll();
}
function selectDate(date){
  selDate = date;
  renderAssignBoard();
}

function clickStudent(id){
  const s = students[id];
  if(!s) return;
  if(assign[id]){
    showToast(`${s['学年']}年${s['組']}組${s['番号']}番はすでに配置済みです (${assign[id].compNo})`);
    return;
  }
  if(!selComp){ showToast('先に事業所を選択してください'); return; }
  if(!selDate){ showToast('先に日付タブを選択してください'); return; }
  const comp = companies[selComp];
  // Check cap
  const cnt = getDateCount(selComp, selDate);
  if(cnt >= comp.dailyCap){
    showToast(`${selDate} の定員(${comp.dailyCap}名)が満員です`); return;
  }
  const ml = matchLevel(s, comp);
  assign[id] = { compNo:selComp, date:selDate, matchLv:ml };
  saveLocal();
  renderAll();
  showToast(`${s['学年']}年${s['組']}組${s['番号']}番 → ${comp['企業名'].substring(0,12)} ${selDate}`);
}

function unassignStudent(id){
  const s = students[id];
  if(!s || !assign[id]) return;
  if(!confirm(`${s['学年']}年${s['組']}組${s['番号']}番の配置を解除しますか?`)) return;
  delete assign[id];
  saveLocal();
  renderAll();
}

function renderAll(){
  renderCompList();
  renderAssignBoard();
  renderStuList();
  updateStats();
}

// ─── Class filter ─────────────────────────────────────────────────────────────
function updateClsOptions(){
  const grF = document.getElementById('fGr').value;
  const clSel = document.getElementById('fCls');
  const cls = new Set(Object.values(students).filter(s=>!grF||s['学年']===grF).map(s=>s['組']));
  const cur = clSel.value;
  clSel.innerHTML = '<option value="">全組</option>' +
    [...cls].sort((a,b)=>Number(a)-Number(b)).map(c=>`<option value="${c}"${c===cur?' selected':''}>${c}組</option>`).join('');
}

// ─── LocalStorage ─────────────────────────────────────────────────────────────
function saveLocal(){ try{ localStorage.setItem('intern_assign', JSON.stringify(assign)); }catch{} }
function loadLocal(){ try{ const d=localStorage.getItem('intern_assign'); if(d) assign=JSON.parse(d); }catch{} }

// ─── Export ───────────────────────────────────────────────────────────────────
function exportCSV(){
  const rows = [['学年','組','番号','性別','配属企業No','企業名','業種','受け入れ先住所','緯度','経度','日付','最寄り駅','市町','業種マッチ','第1希望業種','第2希望業種','第3希望業種','備考']];
  Object.entries(students).forEach(([id,s])=>{
    const a = assign[id];
    const compNo = a?.compNo||'';
    const comp = a ? companies[compNo] : null;
    const ml = a ? a.matchLv : '';
    const matchLabel = ml===0?'✅第1希望一致':ml===1?'⭕第2希望':ml===2?'⭕第3希望':ml===3?'🔴不一致':'未配置';
    rows.push([
      s['学年'],s['組'],s['番号'],s['性別'],
      compNo, comp?comp['企業名']:'', comp?comp['業種カテゴリ']:'',
      comp?comp['住所']:'', comp?comp['緯度']:'', comp?comp['経度']:'',
      a?a.date:'', s['最寄り駅'], s['市町'],
      a?matchLabel:'未配置',
      s.pref1, s.pref2, s.pref3, s['備考']||''
    ]);
  });
  const bom = '﻿';
  const csv = bom + rows.map(r=>r.map(v=>String(v).includes(',')?`"${v}"`:v).join(',')).join('\r\n');
  const url = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  const a = document.createElement('a');
  a.href=url; a.download='配置案.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('配置案.csv をダウンロードしました');
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg){
  const t=document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}

// ─── Overlay / file loading ──────────────────────────────────────────────────
let compText='', stuText='';

document.getElementById('fComp').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=()=>{ compText=r.result; }; r.readAsText(f,'UTF-8');
});
document.getElementById('fStu').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=()=>{ stuText=r.result; }; r.readAsText(f,'UTF-8');
});

document.getElementById('btnUpload').addEventListener('click', ()=>{
  const msg=document.getElementById('overlay-msg');
  if(!compText){ msg.textContent='企業マスターDB.csv を選択してください'; return; }
  if(!stuText) { msg.textContent='生徒名簿DB.csv を選択してください'; return; }
  try{
    loadCompanies(compText); loadStudents(stuText);
    loadLocal();
    document.getElementById('overlay').style.display='none';
    renderAll();
  }catch(e){ msg.textContent='読み込みエラー: '+e.message; }
});

document.getElementById('btnFetch').addEventListener('click', async ()=>{
  const msg=document.getElementById('overlay-msg');
  msg.textContent='読み込み中...';
  try{
    const [r1,r2] = await Promise.all([
      fetch('企業マスターDB.csv'),
      fetch('生徒名簿DB.csv')
    ]);
    if(!r1.ok || !r2.ok) throw new Error('ファイルが見つかりません');
    const [t1,t2] = await Promise.all([r1.text(), r2.text()]);
    loadCompanies(t1); loadStudents(t2);
    loadLocal();
    document.getElementById('overlay').style.display='none';
    renderAll();
  }catch(e){ msg.textContent='自動取得失敗。ファイルをアップロードしてください。('+e.message+')'; }
});

// Re-load button
document.getElementById('btnLoad').addEventListener('click', ()=>{
  document.getElementById('overlay').style.display='flex';
});

// Load existing assignment CSV
document.getElementById('btnLoadAssign').addEventListener('click', ()=>{
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.csv';
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{
      loadAssignments(r.result);
      saveLocal();
      renderAll();
      showToast('既存配置を読み込みました（'+Object.keys(assign).length+'件）');
    };
    r.readAsText(f,'UTF-8');
  };
  inp.click();
});

// Clear assignments
document.getElementById('btnClear').addEventListener('click', ()=>{
  if(!confirm('全ての配置をクリアします。よろしいですか?')) return;
  assign={};
  saveLocal();
  renderAll();
  showToast('配置をクリアしました');
});

// Export
document.getElementById('btnExport').addEventListener('click', exportCSV);

// Filter events
['fCat','fGrade'].forEach(id=>document.getElementById(id).addEventListener('change', renderCompList));
['fGr','fCls','fStat','fMatch','fSort'].forEach(id=>document.getElementById(id).addEventListener('change', renderStuList));
document.getElementById('fGr').addEventListener('change', ()=>{ updateClsOptions(); renderStuList(); });

(async()=>{
  try{
    const [r1,r2]=await Promise.all([fetch('企業マスターDB.csv'),fetch('生徒名簿DB.csv')]);
    if(!r1.ok||!r2.ok) throw new Error();

    loadLocal();
    document.getElementById('overlay').style.display='none';
    renderAll();
  }catch{

  }
