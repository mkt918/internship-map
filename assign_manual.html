<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>インターンシップ 手動配置ツール（地図連動）</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg:#f0f2f5; --surface:#ffffff; --surface2:#f5f7fa; --border:#dde1ea;
  --text:#1a1d2e; --dim:#6b7280; --accent:#3b6be8;
  --c-hoiku:#16a34a; --c-ko:#dc2626; --c-food:#d97706;
  --c-butsu:#2563eb; --c-beauty:#c026d3; --c-hanbai:#7c3aed; --c-other:#6b7280;
  --m0:#16a34a; --m1:#16a34a; --m2:#ca8a04; --m3:#ea580c; --m4:#ea580c; --m5:#dc2626;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo','Yu Gothic UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}

/* Header */
header{background:#fff;border-bottom:2px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:14px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.06);z-index:1000}
header h1{font-size:15px;font-weight:800;white-space:nowrap;color:var(--accent)}
.hstats{display:flex;gap:14px;color:var(--dim);font-size:12px}
.hstats b{color:var(--text);font-weight:700}
.hbtns{margin-left:auto;display:flex;gap:6px;align-items:center}
button{padding:5px 12px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:filter .1s}
button:hover{filter:brightness(.93)}
.btn-p{background:var(--accent);color:#fff}
.btn-s{background:#e8edf5;color:var(--text)}
.btn-d{background:#fee2e2;color:#991b1b}

/* Layout */
.panels{display:flex;flex:1;overflow:hidden}
.panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.panel:last-child{border-right:none}
#pC{width:240px;flex-shrink:0;background:#fafbfc}
#pCenter{flex:1;display:flex;flex-direction:column;overflow:hidden}
#pS{width:290px;flex-shrink:0;background:#fafbfc}
.ph{padding:9px 10px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0}
.ph h2{font-size:11px;font-weight:700;margin-bottom:7px;color:var(--dim);text-transform:uppercase;letter-spacing:.04em}
.pb{flex:1;overflow-y:auto;padding:6px}
select,input[type=text]{background:#fff;color:var(--text);border:1px solid var(--border);border-radius:5px;padding:4px 7px;font-size:11px;font-family:inherit;cursor:pointer;outline:none}
select:focus{border-color:var(--accent)}
.frow{display:flex;gap:5px;flex-wrap:wrap}

/* Map */
#map{height:46%;min-height:230px;flex-shrink:0;background:#dfe6ee;z-index:1}
.board-wrap{flex:1;overflow-y:auto;background:var(--bg);padding:12px}

/* Category dots */
.cd-hoiku{background:var(--c-hoiku)} .cd-ko{background:var(--c-ko)} .cd-food{background:var(--c-food)}
.cd-butsu{background:var(--c-butsu)} .cd-beauty{background:var(--c-beauty)} .cd-hanbai{background:var(--c-hanbai)} .cd-other{background:var(--c-other)}

/* Company cards */
.cc{padding:8px 10px;border-radius:7px;margin-bottom:3px;cursor:pointer;background:#fff;transition:background .1s;border:1px solid var(--border);border-left:3px solid transparent}
.cc:hover{background:#eef2fb}
.cc.sel{background:#dbe8ff;border-left-color:var(--accent);border-color:#b3ccff}
.cc-top{display:flex;align-items:center;gap:6px}
.cno{font-size:10px;font-weight:800;padding:2px 5px;border-radius:3px;background:#e8edf5;color:var(--dim);white-space:nowrap}
.cname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.cc-bot{display:flex;align-items:center;gap:5px;margin-top:4px}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ccat{font-size:10px;color:var(--dim);flex:1}
.cap-ct{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:auto;white-space:nowrap}
.ok{background:#dcfce7;color:#15803d} .warn{background:#fef9c3;color:#a16207} .full{background:#fee2e2;color:#b91c1c}

/* Board */
.no-sel{display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:14px;padding:20px;text-align:center}
.comp-hdr{background:#fff;border-radius:8px;padding:12px 16px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.comp-hdr h2{font-size:15px;font-weight:700;margin-bottom:6px}
.comp-meta{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--dim)}
.comp-meta span b{color:var(--text)}
.dtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.dtab{padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;border:2px solid var(--border);background:#fff;transition:all .1s}
.dtab:hover{border-color:#93c5fd;background:#eff6ff}
.dtab.act{border-color:var(--accent);background:#dbe8ff;color:var(--accent)}
.dtab .sc{font-size:10px;margin-left:4px;font-weight:400}
.slot-area{background:#fff;border-radius:8px;border:1px solid var(--border);padding:12px;min-height:90px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.slot-area h3{font-size:11px;font-weight:700;color:var(--dim);margin-bottom:10px;text-transform:uppercase}
.sgrid{display:flex;flex-wrap:wrap;gap:6px}
.astu{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;background:#f5f7fa;font-size:12px;cursor:pointer;border:1px solid var(--border)}
.astu:hover{border-color:#fca5a5;background:#fff5f5}
.eslot{padding:5px 10px;border-radius:6px;border:1px dashed #cbd5e1;font-size:11px;color:#cbd5e1;background:#fafbfc}
.no-date{color:var(--dim);font-size:12px;padding:24px;text-align:center}
.hint{font-size:11px;color:var(--dim);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}

/* Student cards */
.sc-card{padding:8px 10px;border-radius:7px;margin-bottom:3px;cursor:pointer;background:#fff;border:1px solid var(--border);border-left:3px solid transparent}
.sc-card:hover:not(.asgnd){background:#f0f4ff}
.sc-card.asgnd{opacity:.45;cursor:default}
.sc-card.m0,.sc-card.m1{border-left-color:var(--m0)}
.sc-card.m2{border-left-color:var(--m2)}
.sc-card.m3,.sc-card.m4{border-left-color:var(--m3)}
.sc-card.m5{border-left-color:var(--m5)}
.sc-top{display:flex;align-items:center;gap:5px}
.sid{font-size:11px;font-weight:700;color:var(--text)}
.sgbadge{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600}
.gf{background:#fce7f3;color:#be185d} .gm{background:#dbeafe;color:#1d4ed8}
.mbadge{margin-left:auto;font-size:13px;font-weight:700}
.dist{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:#eef2fb;color:var(--accent)}
.dist.over{background:#fee2e2;color:#b91c1c}
.sc-line{margin-top:3px;font-size:10px;color:var(--dim);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.setsu{margin-top:3px;font-size:10px;color:#7c3aed}
.pchips{margin-top:3px;display:flex;gap:3px;flex-wrap:wrap}
.pchip{padding:1px 6px;border-radius:3px;font-size:10px;background:#f0f2f5;color:var(--dim);border:1px solid var(--border)}
.asgnd-to{font-size:10px;color:var(--m0);margin-top:2px;font-weight:600}
.station-hdr{font-size:11px;font-weight:700;color:var(--accent);padding:7px 4px 3px;margin-top:8px;border-bottom:2px solid #dbe8ff}.station-hdr:first-child{margin-top:0}.station-hdr span{font-weight:400;color:var(--dim);margin-left:4px}

::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* Map marker labels */
.cmarker{border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);width:100%;height:100%}
.cmarker.sel{border:3px solid #1a1d2e;box-shadow:0 0 0 3px rgba(59,107,232,.4)}
.smarker{background:#1a1d2e;border-radius:50%;border:2px solid #fff;width:100%;height:100%}
.leaflet-tooltip.lbl{background:rgba(26,29,46,.85);color:#fff;border:none;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px}

/* Legend */
.legend{position:absolute;bottom:10px;right:10px;background:rgba(255,255,255,.94);border:1px solid var(--border);border-radius:6px;padding:7px 9px;font-size:10px;z-index:500;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.legend div{display:flex;align-items:center;gap:5px;margin:2px 0}
.legend .ld{width:9px;height:9px;border-radius:50%}

/* Overlay */
#overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;gap:14px;backdrop-filter:blur(4px)}
#overlay h2{font-size:20px;color:#fff}
#overlay p{color:#cbd5e1;font-size:13px;text-align:center;max-width:440px}
.file-inputs{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.file-box{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 18px;text-align:center;min-width:190px;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.file-box h3{font-size:12px;margin-bottom:8px}
.file-box input[type=file]{font-size:11px;color:var(--dim);width:100%}
.or-sep{color:#cbd5e1;font-size:12px}
.toast{position:fixed;bottom:18px;right:18px;padding:10px 18px;background:#fff;border:1px solid var(--border);border-radius:8px;font-size:12px;z-index:3000;animation:fin .2s ease;box-shadow:0 4px 12px rgba(0,0,0,.12)}
@keyframes fin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<header>
  <h1>🗺 インターンシップ 手動配置（地図連動）</h1>
  <div class="hstats">
    <span>配置済 <b id="st-done">0</b>/<span id="st-all">0</span></span>
    <span>未配置 <b id="st-left">0</b></span>
    <span>◎事前説明 <b id="st-setsu">0</b></span>
    <span>○希望 <b id="st-pref">0</b></span>
    <span>🔴不一致 <b id="st-ng">0</b></span>
  </div>
  <div class="hbtns">
    <button class="btn-s" id="btnLoad">📂 CSV再読込</button>
    <button class="btn-s" id="btnLoadAssign">📥 配置案を読込</button>
    <button class="btn-s" id="btnLoadKajita">🔄 梶田案を再読込</button>
    <button class="btn-d" id="btnClear">🗑 配置クリア</button>
    <button class="btn-p" id="btnExport">💾 CSV出力</button>
  </div>
</header>

<div class="panels">
  <!-- Left: company list -->
  <div class="panel" id="pC">
    <div class="ph">
      <h2>事業所（<span id="comp-count">0</span>社）</h2>
      <div class="frow">
        <select id="fCat" style="flex:1">
          <option value="">全業種</option>
          <option value="保育">保育</option><option value="製造工業">製造工業</option>
          <option value="製造食品">製造食品</option><option value="物流">物流</option>
          <option value="美容">美容</option><option value="販売">販売</option>
        </select>
        <select id="fGrade">
          <option value="">全学年</option><option value="1">1年</option><option value="2">2年</option>
        </select>
      </div>
    </div>
    <div class="pb" id="compList"></div>
  </div>

  <!-- Center: map + board -->
  <div id="pCenter">
    <div id="map"></div>
    <div class="board-wrap">
      <div id="noSel" class="no-sel">← 事業所を選択すると地図と配置欄が表示されます</div>
      <div id="assignBoard" style="display:none"></div>
    </div>
  </div>

  <!-- Right: student list -->
  <div class="panel" id="pS">
    <div class="ph">
      <h2>生徒（<span id="stu-count">0</span>名）</h2>
      <div class="frow">
        <select id="fGr" style="width:64px"><option value="">全学年</option><option value="1">1年</option><option value="2">2年</option></select>
        <select id="fCls" style="width:58px"><option value="">全組</option></select>
        <select id="fStat" style="flex:1">
          <option value="all">全員</option><option value="unassigned">未配置</option><option value="assigned">配置済</option>
        </select>
      </div>
      <div class="frow" style="margin-top:5px">
        <select id="fMatch" style="flex:1">
          <option value="all">全マッチ</option><option value="setsu">◎事前説明</option>
          <option value="pref">○希望</option><option value="ng">🔴不一致</option>
        </select>
        <select id="fSort" style="flex:1">
          <option value="match">マッチ順</option><option value="dist">距離順</option>
          <option value="grade">学年順</option><option value="station">駅順</option>
        </select>
      </div>
      <div class="frow" style="margin-top:5px">
        <select id="fStation" style="flex:1"><option value="">全駅</option></select>
      </div>
    </div>
    <div class="pb" id="stuList"></div>
  </div>
</div>

<!-- Overlay -->
<div id="overlay">
  <h2>📂 データを読み込む</h2>
  <p>GitHub Pages 上では同フォルダのCSVを自動取得します。ローカルで開いた場合は下から最低2つ（企業マスター・生徒名簿）をアップロードしてください。</p>
  <div class="file-inputs">
    <div class="file-box"><h3>企業マスターDB.csv</h3><input type="file" id="fComp" accept=".csv"></div>
    <div class="file-box"><h3>生徒名簿DB.csv</h3><input type="file" id="fStu" accept=".csv"></div>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <button class="btn-p" id="btnUpload">📤 アップロード開始</button>
    <span class="or-sep">または</span>
    <button class="btn-s" id="btnFetch">🌐 同フォルダから自動取得</button>
  </div>
  <p id="overlay-msg" style="color:#fca5a5;font-size:12px;min-height:1em"></p>
</div>

<script>
'use strict';
// ─── State ───────────────────────────────────────────────
let companies={}, students={}, stations={}, assign={};
let selComp=null, selDate=null;
let map=null, compMarkers={}, overlayLayer=null;

// ─── Categories ──────────────────────────────────────────
const catClass={'保育':'hoiku','製造工業':'ko','製造食品':'food','物流':'butsu','美容':'beauty','販売':'hanbai'};
const catHex  ={'保育':'#16a34a','製造工業':'#dc2626','製造食品':'#d97706','物流':'#2563eb','美容':'#c026d3','販売':'#7c3aed'};
function catCls(c){return 'cd-'+(catClass[c]||'other');}
function primCat(cats){return cats[0]||'';}
function catColor(c){return catHex[c]||'#6b7280';}

// ─── Match hierarchy: 事前説明1>事前説明2>第1>第2>第3 ──
const matchIcon=['◎','◎','○','○','○','🔴'];
const matchCls =['m0','m1','m2','m3','m4','m5'];
// 製造工業・製造食品は同一視（'製造'に統合）してマッチ判定
function normMatchCat(c){return (c==='製造工業'||c==='製造食品')?'製造':c;}
function matchLevel(s, comp){
  const cc = comp.cats.map(normMatchCat);
  for(let i=0;i<s.prefLayers.length;i++){
    const p=normMatchCat(s.prefLayers[i]);
    if(p && p!=='その他' && cc.includes(p)) return i;
  }
  return 5;
}
function isSetsu(lv){return lv===0||lv===1;}
function isPref(lv){return lv===2||lv===3||lv===4;}

// ─── Distance ────────────────────────────────────────────
function haversine(a,b){
  if(!a||!b) return null;
  const R=6371,d=x=>x*Math.PI/180;
  const dla=d(b[0]-a[0]),dlo=d(b[1]-a[1]);
  const h=Math.sin(dla/2)**2+Math.cos(d(a[0]))*Math.cos(d(b[0]))*Math.sin(dlo/2)**2;
  return R*2*Math.atan2(Math.sqrt(h),Math.sqrt(1-h));
}
function distOf(s,comp){
  if(!s.coords||!comp.coords) return null;
  return haversine(s.coords,comp.coords);
}

// ─── Capacity ────────────────────────────────────────────
function parseCap(text){
  if(!text) return 2;
  const t=text.replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
  const m=t.match(/(\d+)\s*[名人]/); return m?parseInt(m[1]):2;
}
function parseDates(text){return text?text.split(';').map(s=>s.trim()).filter(Boolean):[];}

// ─── CSV parser (multi-line quoted) ──────────────────────
function parseCSV(text){
  const rows=[];let row=[],cell='',q=false;
  const t=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  for(let i=0;i<t.length;i++){const c=t[i];
    if(q){if(c==='"'){if(t[i+1]==='"'){cell+='"';i++;}else q=false;}else cell+=c;}
    else{if(c==='"')q=true;else if(c===','){row.push(cell);cell='';}
      else if(c==='\n'){row.push(cell);cell='';if(row.some(v=>v.trim()))rows.push(row);row=[];}
      else cell+=c;}}
  if(cell||row.length){row.push(cell);if(row.some(v=>v.trim()))rows.push(row);}
  return rows;
}
function csvObj(text){
  const r=parseCSV(text);if(r.length<2)return[];
  const h=r[0].map(x=>x.replace(/^﻿/,''));
  return r.slice(1).map(row=>{const o={};h.forEach((k,i)=>o[k]=row[i]||'');return o;});
}
function splitCats(t){return (t||'').replace(/、/g,',').split(',').map(x=>x.trim()).filter(Boolean);}

// ─── Loaders ─────────────────────────────────────────────
function loadCompanies(text){
  companies={};
  csvObj(text).forEach(r=>{
    const no=(r['No']||'').trim();if(!no)return;
    let coords=null;const la=parseFloat(r['緯度']),lo=parseFloat(r['経度']);
    if(!isNaN(la)&&!isNaN(lo))coords=[la,lo];
    companies[no]={no,name:r['企業名']||'',cats:splitCats(r['業種カテゴリ']),catText:r['業種カテゴリ']||'',
      address:r['住所']||'',coords,accept1:(r['受入_1年']||'').toUpperCase()==='Y',
      accept2:(r['受入_2年']||'').toUpperCase()==='Y',capText:r['受け入れ人数の説明']||'',
      dailyCap:parseCap(r['受け入れ人数の説明']),dates:parseDates(r['受入可能日程']),
      access:r['アクセス']||'',note:r['特記事項']||'',nearSt:'',line:''};
  });
}
function loadLoc(text){
  csvObj(text).forEach(r=>{
    const no=(r['No']||'').trim();if(!no||!companies[no])return;
    companies[no].nearSt=r['最寄り駅']||'';companies[no].line=r['路線']||'';
  });
}
function loadStations(text){
  stations={};
  csvObj(text).forEach(r=>{
    const n=(r['駅名']||'').trim();if(!n)return;
    stations[n]={line:r['路線']||'',coords:[parseFloat(r['緯度']),parseFloat(r['経度'])]};
  });
}
function stationLine(name){
  if(stations[name])return stations[name].line;
  if(stations[name+'駅'])return stations[name+'駅'].line;
  // alias
  const al={'栢森駅':'柏森駅','富岡駅':'富岡前駅'};
  if(al[name]&&stations[al[name]])return stations[al[name]].line;
  return '';
}
function loadStudents(text){
  students={};
  csvObj(text).forEach(r=>{
    const g=(r['学年']||'').trim(),cl=(r['組']||'').trim(),n=(r['番号']||'').trim();
    if(!g||!cl||!n)return;const id=`${g}-${cl}-${n}`;
    let coords=null;const la=parseFloat(r['駅緯度']),lo=parseFloat(r['駅経度']);
    if(!isNaN(la)&&!isNaN(lo))coords=[la,lo];
    students[id]={id,grade:g,cls:cl,num:n,gender:(r['性別']||'').trim(),
      setsu1:r['事前説明１']||r['事前説明1']||'',setsu2:r['事前説明２']||r['事前説明2']||'',
      prefLayers:[(r['事前説明1業種']||'').trim(),(r['事前説明2業種']||'').trim(),
                  (r['第1希望業種']||'').trim(),(r['第2希望業種']||'').trim(),(r['第3希望業種']||'').trim()],
      p1:(r['第1希望業種']||'').trim(),p2:(r['第2希望業種']||'').trim(),p3:(r['第3希望業種']||'').trim(),
      station:(r['最寄り駅']||'').trim(),city:(r['市町']||'').trim(),coords,biko:r['備考']||''};
  });
}
function loadAssignments(text){
  assign={};
  csvObj(text).forEach(r=>{
    const g=(r['学年']||'').trim(),cl=(r['組']||'').trim(),n=(r['番号']||'').trim();
    const no=(r['配属企業No']||'').trim(),date=(r['日付']||'').trim();
    if(!g||!cl||!n||!no)return;const id=`${g}-${cl}-${n}`;
    const s=students[id],c=companies[no];
    assign[id]={compNo:no,date,matchLv:(s&&c)?matchLevel(s,c):5};
  });
}

// ─── Counters ────────────────────────────────────────────
function compCount(no){return Object.values(assign).filter(a=>a.compNo===no).length;}
function dateCount(no,d){return Object.values(assign).filter(a=>a.compNo===no&&a.date===d).length;}
function slotCls(f,c){return f>=c?'full':(f>=c*0.7?'warn':'ok');}

// ─── Map ─────────────────────────────────────────────────
function initMap(){
  map=L.map('map',{zoomControl:true}).setView([35.33,136.88],12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {maxZoom:18,attribution:'© OpenStreetMap'}).addTo(map);
  overlayLayer=L.layerGroup().addTo(map);
  // legend
  const lg=L.control({position:'bottomright'});
  lg.onAdd=function(){const d=L.DomUtil.create('div','legend');
    d.innerHTML=Object.entries(catHex).map(([k,v])=>`<div><span class="ld" style="background:${v}"></span>${k}</div>`).join('')
      +`<div><span class="ld" style="background:#1a1d2e"></span>生徒最寄駅</div>`;
    return d;};
  lg.addTo(map);
}
function renderCompMarkers(){
  Object.values(compMarkers).forEach(m=>map.removeLayer(m));
  compMarkers={};
  Object.values(companies).forEach(c=>{
    if(!c.coords)return;
    const col=catColor(primCat(c.cats));
    const size=selComp===c.no?20:13;
    const icon=L.divIcon({className:'',html:`<div class="cmarker${selComp===c.no?' sel':''}" style="background:${col}"></div>`,
      iconSize:[size,size],iconAnchor:[size/2,size/2]});
    const m=L.marker(c.coords,{icon}).addTo(map);
    m.bindTooltip(`${c.no} ${c.name}`,{className:'lbl'});
    m.on('click',()=>selectComp(c.no));
    compMarkers[c.no]=m;
  });
}
function updateMapForSelection(){
  overlayLayer.clearLayers();
  Object.entries(compMarkers).forEach(([no,m])=>{
    const c=companies[no],col=catColor(primCat(c.cats)),sel=selComp===no,size=sel?20:13;
    m.setIcon(L.divIcon({className:'',html:`<div class="cmarker${sel?' sel':''}" style="background:${col}"></div>`,
      iconSize:[size,size],iconAnchor:[size/2,size/2]}));
  });
  if(!selComp||!companies[selComp])return;
  const c=companies[selComp];if(!c.coords)return;
  // lines to assigned students (grouped by station)
  const byStation={};
  Object.entries(assign).filter(([,a])=>a.compNo===selComp).forEach(([id])=>{
    const s=students[id];if(!s||!s.coords)return;
    const key=s.station||s.city;(byStation[key]=byStation[key]||{coords:s.coords,ids:[]}).ids.push(id);
  });
  Object.entries(byStation).forEach(([st,o])=>{
    L.polyline([c.coords,o.coords],{color:'#3b6be8',weight:2,opacity:.5,dashArray:'4 4'}).addTo(overlayLayer);
    const mk=L.marker(o.coords,{icon:L.divIcon({className:'',html:`<div class="smarker"></div>`,iconSize:[12,12],iconAnchor:[6,6]})}).addTo(overlayLayer);
    const dk=haversine(c.coords,o.coords);
    mk.bindTooltip(`${st} (${o.ids.length}名 / ${dk?dk.toFixed(1):'?'}km)`,{className:'lbl'});
  });
  map.panTo(c.coords,{animate:true});
}

// ─── Render: company list ────────────────────────────────
function renderCompList(){
  const cf=document.getElementById('fCat').value,gf=document.getElementById('fGrade').value;
  const el=document.getElementById('compList');
  const list=Object.values(companies).filter(c=>{
    if(cf&&!c.cats.includes(cf))return false;
    if(gf==='1'&&!c.accept1)return false;
    if(gf==='2'&&!c.accept2)return false;return true;});
  document.getElementById('comp-count').textContent=list.length;
  el.innerHTML=list.map(c=>{
    const filled=compCount(c.no),tot=c.dailyCap*Math.max(1,c.dates.length);
    const grades=[c.accept1?'1年':'',c.accept2?'2年':''].filter(Boolean).join('/');
    return `<div class="cc${selComp===c.no?' sel':''}" onclick="selectComp('${c.no}')">
      <div class="cc-top"><span class="cno">${c.no}</span>
        <span class="cname" title="${c.name}">${c.name.replace('株式会社','(株)').replace('有限会社','(有)').substring(0,18)}</span></div>
      <div class="cc-bot"><span class="cdot ${catCls(primCat(c.cats))}"></span>
        <span class="ccat">${c.catText}</span><span style="font-size:10px;color:var(--dim)">${grades}</span>
        <span class="cap-ct ${slotCls(filled,tot)}">${filled}/${tot}</span></div></div>`;
  }).join('');
}

// ─── Render: board ───────────────────────────────────────
function renderBoard(){
  const noSel=document.getElementById('noSel'),board=document.getElementById('assignBoard');
  if(!selComp||!companies[selComp]){noSel.style.display='flex';board.style.display='none';return;}
  noSel.style.display='none';board.style.display='block';
  const c=companies[selComp],cat=primCat(c.cats);
  const grades=[c.accept1?'1年':'',c.accept2?'2年':''].filter(Boolean).join('・');
  const dtabs=c.dates.map(d=>{const cnt=dateCount(selComp,d);
    return `<div class="dtab${selDate===d?' act':''}" onclick="selectDate('${d}')">${d}<span class="sc ${slotCls(cnt,c.dailyCap)}">${cnt}/${c.dailyCap}</span></div>`;}).join('');
  let slot='';
  if(!selDate)slot=`<div class="no-date">上の日付タブを選択してください</div>`;
  else{
    const cnt=dateCount(selComp,selDate),cap=c.dailyCap;
    const asg=Object.entries(assign).filter(([,a])=>a.compNo===selComp&&a.date===selDate).map(([id,a])=>{
      const s=students[id];if(!s)return'';const dk=distOf(s,c);
      return `<div class="astu" onclick="unassign('${id}')" title="クリックで解除">
        <span>${matchIcon[a.matchLv]}</span><span>${s.grade}年${s.cls}組${s.num}番</span>
        <span style="color:var(--dim);font-size:10px">${s.station||s.city}${dk!=null?' '+dk.toFixed(1)+'km':''}</span><span style="color:var(--dim)">✕</span></div>`;
    }).join('');
    const empty=Array.from({length:Math.max(0,cap-cnt)},()=>`<div class="eslot">空き</div>`).join('');
    slot=`<div class="sgrid">${asg}${empty}</div>`;
  }
  board.innerHTML=`<div class="comp-hdr"><h2><span style="color:${catColor(cat)};margin-right:6px">●</span>${c.name}</h2>
    <div class="comp-meta"><span>業種 <b>${c.catText}</b></span><span>1日定員 <b>${c.dailyCap}名</b></span>
      <span>受入 <b>${grades||'-'}</b></span><span>最寄駅 <b>${c.nearSt||'-'}</b></span>
      <span>路線 <b>${c.line||'-'}</b></span><span>定員 <b>${c.capText||'-'}</b></span>
      ${c.note?`<span style="color:var(--m3)">⚠ ${c.note.substring(0,40)}</span>`:''}</div></div>
    <div class="dtabs">${dtabs||'<span style="color:var(--dim)">日程なし</span>'}</div>
    <div class="slot-area"><h3>${selDate?selDate+' の配置':'日付を選択'}</h3>${slot}</div>
    <div class="hint">💡 右で生徒をクリック→選択中の日付に配置 ／ 配置済みをクリックで解除</div>`;
}

// ─── Render: student list ────────────────────────────────
function renderStuList(){
  const grF=v('fGr'),clF=v('fCls'),stF=v('fStat'),mF=v('fMatch'),sortF=v('fSort'),staF=v('fStation');
  const el=document.getElementById('stuList'),comp=selComp?companies[selComp]:null;
  let list=Object.values(students).filter(s=>{
    if(grF&&s.grade!==grF)return false;
    if(clF&&s.cls!==clF)return false;
    if(staF&&(s.station||s.city||'不明')!==staF)return false;
    if(stF==='assigned'&&!assign[s.id])return false;
    if(stF==='unassigned'&&assign[s.id])return false;
    if(comp){const ml=matchLevel(s,comp);
      if(mF==='setsu'&&!isSetsu(ml))return false;
      if(mF==='pref'&&!isPref(ml))return false;
      if(mF==='ng'&&ml!==5)return false;}
    return true;});
  const gk=s=>`${s.grade}-${s.cls}-${String(s.num).padStart(3,'0')}`;
  list.sort((a,b)=>{
    if(sortF==='grade')return gk(a).localeCompare(gk(b));
    if(sortF==='station'){const sa=a.station||a.city||'',sb=b.station||b.city||'';
      if(sa!==sb)return sa.localeCompare(sb,'ja');return gk(a).localeCompare(gk(b));}
    if(sortF==='dist'&&comp){const da=distOf(a,comp)??9999,db=distOf(b,comp)??9999;
      if(da!==db)return da-db;return gk(a).localeCompare(gk(b));}
    const ma=comp?matchLevel(a,comp):5,mb=comp?matchLevel(b,comp):5;
    if(ma!==mb)return ma-mb;
    if(comp){const da=distOf(a,comp)??9999,db=distOf(b,comp)??9999;if(da!==db)return da-db;}
    return gk(a).localeCompare(gk(b));});
  document.getElementById('stu-count').textContent=list.length;

  function card(s){
    const asg=!!assign[s.id],ml=comp?matchLevel(s,comp):-1;
    const dk=comp?distOf(s,comp):null;
    const gCls=s.gender==='女'?'gf':'gm';
    const line=stationLine(s.station);
    const prefs=[s.p1,s.p2,s.p3].filter(Boolean);
    const a=assign[s.id];
    return `<div class="sc-card${asg?' asgnd':''} ${ml>=0?matchCls[ml]:''}" onclick="clickStu('${s.id}')">
      <div class="sc-top"><span class="sid">${s.grade}年${s.cls}組${s.num}番</span>
        <span class="sgbadge ${gCls}">${s.gender}</span>
        ${ml>=0?`<span class="mbadge">${matchIcon[ml]}</span>`:''}
        ${dk!=null?`<span class="dist${dk>15?' over':''}">${dk.toFixed(1)}km</span>`:''}</div>
      <div class="sc-line">🚉 ${s.station||s.city||'-'}${line?` <span style="color:var(--accent)">${line}</span>`:''}</div>
      ${(s.setsu1||s.setsu2)?`<div class="setsu">説明: ${s.setsu1}${s.setsu2?' / '+s.setsu2:''}</div>`:''}
      <div class="pchips">${prefs.map(p=>`<span class="pchip">${p}</span>`).join('')}</div>
      ${a?`<div class="asgnd-to">✅ ${a.compNo} / ${a.date||'日付未設定'}</div>`:''}</div>`;
  }
  if(sortF==='station'){
    let html='',last='';
    list.forEach(s=>{const st=s.station||s.city||'不明';
      if(st!==last){const cnt=list.filter(x=>(x.station||x.city||'不明')===st).length;
        html+=`<div class="station-hdr">${st} <span>${cnt}名</span></div>`;last=st;}
      html+=card(s);});
    el.innerHTML=html;
  }else el.innerHTML=list.map(card).join('');
}
function v(id){return document.getElementById(id).value;}

// ─── Stats ───────────────────────────────────────────────
function updateStats(){
  const all=Object.keys(students).length,done=Object.keys(assign).length;
  const vals=Object.values(assign);
  document.getElementById('st-all').textContent=all;
  document.getElementById('st-done').textContent=done;
  document.getElementById('st-left').textContent=all-done;
  document.getElementById('st-setsu').textContent=vals.filter(a=>isSetsu(a.matchLv)).length;
  document.getElementById('st-pref').textContent=vals.filter(a=>isPref(a.matchLv)).length;
  document.getElementById('st-ng').textContent=vals.filter(a=>a.matchLv===5).length;
}

// ─── Filter options ──────────────────────────────────────
function updateClsOptions(){
  const grF=v('fGr'),sel=document.getElementById('fCls'),cur=sel.value;
  const cls=new Set(Object.values(students).filter(s=>!grF||s.grade===grF).map(s=>s.cls));
  sel.innerHTML='<option value="">全組</option>'+[...cls].sort((a,b)=>+a-+b).map(c=>`<option value="${c}"${c===cur?' selected':''}>${c}組</option>`).join('');
}
function updateStationOptions(){
  const grF=v('fGr'),clF=v('fCls'),sel=document.getElementById('fStation'),cur=sel.value;
  const sts=new Set(Object.values(students).filter(s=>(!grF||s.grade===grF)&&(!clF||s.cls===clF)).map(s=>s.station||s.city||'不明'));
  sel.innerHTML='<option value="">全駅</option>'+[...sts].sort().map(st=>`<option value="${st}"${st===cur?' selected':''}>${st}</option>`).join('');
}

// ─── Actions ─────────────────────────────────────────────
function selectComp(no){selComp=no;selDate=null;renderAll();updateMapForSelection();}
function selectDate(d){selDate=d;renderBoard();}
function clickStu(id){
  const s=students[id];if(!s)return;
  if(assign[id]){toast(`${s.grade}年${s.cls}組${s.num}番は配置済 (${assign[id].compNo})`);return;}
  if(!selComp){toast('先に事業所を選択してください');return;}
  if(!selDate){toast('先に日付タブを選択してください');return;}
  const c=companies[selComp];
  if(dateCount(selComp,selDate)>=c.dailyCap){toast(`${selDate} は定員(${c.dailyCap}名)満員`);return;}
  assign[id]={compNo:selComp,date:selDate,matchLv:matchLevel(s,c)};
  saveLocal();renderAll();updateMapForSelection();
  toast(`${s.grade}年${s.cls}組${s.num}番 → ${c.name.substring(0,12)} ${selDate}`);
}
function unassign(id){
  const s=students[id];if(!s||!assign[id])return;
  if(!confirm(`${s.grade}年${s.cls}組${s.num}番の配置を解除しますか?`))return;
  delete assign[id];saveLocal();renderAll();updateMapForSelection();
}
function renderAll(){renderCompList();renderBoard();updateClsOptions();updateStationOptions();renderStuList();updateStats();renderCompMarkers();}

// ─── LocalStorage ────────────────────────────────────────
function saveLocal(){try{localStorage.setItem('intern_assign_v2',JSON.stringify(assign));}catch{}}
function loadLocal(){try{const d=localStorage.getItem('intern_assign_v2');if(d)assign=JSON.parse(d);}catch{}}

// ─── Export ──────────────────────────────────────────────
const ML_LABEL=['◎事前説明1','◎事前説明2','○第1希望','○第2希望','○第3希望','🔴不一致'];
function exportCSV(){
  const rows=[['学年','組','番号','性別','配属企業No','企業名','業種カテゴリ','受け入れ先住所','緯度','経度','日付','最寄り駅','市町','距離km','業種マッチ','事前説明1','事前説明2','第1希望','第2希望','第3希望','備考']];
  Object.values(students).forEach(s=>{
    const a=assign[s.id],c=a?companies[a.compNo]:null,ml=a?a.matchLv:null;
    const dk=c?distOf(s,c):null;
    rows.push([s.grade,s.cls,s.num,s.gender,a?a.compNo:'',c?c.name:'',c?c.catText:'',c?c.address:'',
      c&&c.coords?c.coords[0]:'',c&&c.coords?c.coords[1]:'',a?a.date:'',s.station,s.city,
      dk!=null?dk.toFixed(1):'',a?ML_LABEL[ml]:'未配置',s.setsu1,s.setsu2,s.p1,s.p2,s.p3,s.biko]);
  });
  const csv='﻿'+rows.map(r=>r.map(x=>{x=String(x);return /[",\n]/.test(x)?`"${x.replace(/"/g,'""')}"`:x;}).join(',')).join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='配置案.csv';a.click();
  toast('配置案.csv をダウンロードしました');
}

// ─── Toast ───────────────────────────────────────────────
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2800);}

// ─── File loading ────────────────────────────────────────
let compText='',stuText='';
document.getElementById('fComp').addEventListener('change',e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=()=>compText=r.result;r.readAsText(f,'UTF-8');}});
document.getElementById('fStu').addEventListener('change',e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=()=>stuText=r.result;r.readAsText(f,'UTF-8');}});
document.getElementById('btnUpload').addEventListener('click',()=>{
  const msg=document.getElementById('overlay-msg');
  if(!compText){msg.textContent='企業マスターDB.csv を選択してください';return;}
  if(!stuText){msg.textContent='生徒名簿DB.csv を選択してください';return;}
  try{loadCompanies(compText);loadStudents(stuText);loadLocal();finishLoad();}
  catch(e){msg.textContent='読み込みエラー: '+e.message;}
});
document.getElementById('btnFetch').addEventListener('click',autoFetch);

async function autoFetch(){
  const msg=document.getElementById('overlay-msg');msg.textContent='読み込み中...';
  try{
    const [comp,stu]=await Promise.all([fetch('企業マスターDB.csv'),fetch('生徒名簿DB.csv')]);
    if(!comp.ok||!stu.ok)throw new Error('企業/生徒CSVが見つかりません');
    loadCompanies(await comp.text());loadStudents(await stu.text());
    // optional enhancers
    try{const loc=await fetch('企業立地DB.csv');if(loc.ok)loadLoc(await loc.text());}catch{}
    try{const sta=await fetch('駅マスターDB.csv');if(sta.ok)loadStations(await sta.text());}catch{}
    let hadLocal=false;loadLocal();if(Object.keys(assign).length)hadLocal=true;
    if(!hadLocal){try{let as=await fetch('梶田正規化.csv');if(!as.ok)as=await fetch('新配置案.csv');if(as.ok)loadAssignments(await as.text());}catch{}}
    finishLoad();
  }catch(e){msg.textContent='自動取得失敗。CSVをアップロードしてください。('+e.message+')';}
}
function finishLoad(){
  document.getElementById('overlay').style.display='none';
  if(!map)initMap();
  setTimeout(()=>map.invalidateSize(),50);
  renderAll();
}

document.getElementById('btnLoad').addEventListener('click',()=>document.getElementById('overlay').style.display='flex');
document.getElementById('btnLoadAssign').addEventListener('click',()=>{
  const inp=document.createElement('input');inp.type='file';inp.accept='.csv';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{loadAssignments(r.result);saveLocal();renderAll();updateMapForSelection();toast('配置案を読込（'+Object.keys(assign).length+'件）');};
    r.readAsText(f,'UTF-8');};inp.click();});
document.getElementById('btnLoadKajita').addEventListener('click',async()=>{
  if(!confirm('現在の配置を破棄して梶田正規化.csvを再読込しますか?'))return;
  try{const as=await fetch('梶田正規化.csv');if(!as.ok)throw 0;
    loadAssignments(await as.text());saveLocal();renderAll();updateMapForSelection();
    toast('梶田正規化案を読込（'+Object.keys(assign).length+'件）');
  }catch{toast('梶田正規化.csv の取得に失敗しました');}});
document.getElementById('btnClear').addEventListener('click',()=>{
  if(!confirm('全配置をクリアしますか?'))return;assign={};saveLocal();renderAll();updateMapForSelection();toast('配置をクリアしました');});
document.getElementById('btnExport').addEventListener('click',exportCSV);

['fCat','fGrade'].forEach(id=>document.getElementById(id).addEventListener('change',()=>{renderCompList();}));
['fStat','fMatch','fSort','fStation'].forEach(id=>document.getElementById(id).addEventListener('change',renderStuList));
document.getElementById('fGr').addEventListener('change',()=>{updateClsOptions();updateStationOptions();renderStuList();});
document.getElementById('fCls').addEventListener('change',()=>{updateStationOptions();renderStuList();});

// ─── Init ────────────────────────────────────────────────
autoFetch();
</script>
