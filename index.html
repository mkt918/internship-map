<meta charset="UTF-8">

<title>インターンシップ管理</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; background: #f5f5f5; color: #333; }
  header { background: #1a237e; color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.2rem; font-weight: 600; }
  .tabs { display: flex; background: #283593; }
  .tab-btn { padding: 10px 28px; color: #9fa8da; font-size: 0.95rem; cursor: pointer; border: none; background: none; transition: all .2s; }
  .tab-btn.active { color: #fff; border-bottom: 3px solid #fff; }
  .tab-btn:hover { color: #e8eaf6; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Map date filter */
  #map-filter { display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
                padding: 8px 14px; background: #283593; border-bottom: 1px solid #1a237e; }
  #map-filter span { color: #9fa8da; font-size: 0.8rem; margin-right: 4px; }
  .date-btn { padding: 4px 12px; border-radius: 20px; border: 1.5px solid #5c6bc0;
              background: transparent; color: #c5cae9; font-size: 0.82rem; cursor: pointer; transition: all .15s; }
  .date-btn:hover { background: #3949ab; color: #fff; }
  .date-btn.active { background: #fff; color: #1a237e; border-color: #fff; font-weight: 600; }
  #map-info { margin-left: auto; color: #9fa8da; font-size: 0.8rem; }

  /* Map */
  #map { height: calc(100vh - 148px); width: 100%; }
  .leaflet-popup-content { min-width: 270px; font-size: 0.85rem; line-height: 1.7; }
  .leaflet-popup-content h3 { font-size: 0.95rem; color: #1a237e; margin-bottom: 6px; border-bottom: 1px solid #e0e0e0; padding-bottom: 4px; }
  .leaflet-popup-content .label { color: #777; font-size: 0.78rem; min-width: 54px; display: inline-block; }
  .popup-row { margin: 2px 0; }
  .popup-students { margin-top: 8px; font-size: 0.8rem; }
  .popup-students summary { cursor: pointer; color: #1a237e; font-weight: 500; }
  .popup-students table { width: 100%; margin-top: 4px; border-collapse: collapse; }
  .popup-students td { padding: 2px 6px; border-bottom: 1px solid #f0f0f0; }
  .gmap-btn { display: inline-block; margin-top: 8px; background: #1a237e; color: #fff;
              padding: 4px 14px; border-radius: 4px; text-decoration: none; font-size: 0.82rem; }

  /* Legend */
  .map-legend { background: white; padding: 10px 14px; border-radius: 8px;
                box-shadow: 0 1px 5px rgba(0,0,0,0.2); font-size: 0.8rem; line-height: 1.8; }
  .map-legend h4 { margin-bottom: 4px; font-size: 0.85rem; color: #333; }
  .legend-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%;
                margin-right: 6px; vertical-align: middle; }

  /* DB */
  #db-container { padding: 16px; max-width: 1200px; margin: 0 auto; }
  .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; background: #fff;
                padding: 14px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
  .filter-bar label { font-size: 0.8rem; color: #555; display: block; margin-bottom: 2px; }
  .filter-bar select, .filter-bar input { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }
  .filter-bar input { width: 200px; }
  .count-badge { margin-left: auto; align-self: center; background: #1a237e; color: #fff;
                 border-radius: 20px; padding: 3px 14px; font-size: 0.82rem; white-space: nowrap; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px;
          overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.1); font-size: 0.88rem; }
  th { background: #1a237e; color: #fff; padding: 10px 12px; text-align: left; font-weight: 500; }
  td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; }
  tr:hover td { background: #e8eaf6; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; }
  .badge-f { background: #fce4ec; color: #880e4f; }
  .badge-m { background: #e3f2fd; color: #0d47a1; }
</style>

// 企業Noで生徒を紐付け
function matchStudents(no) {
  return students.filter(s => s.compNo === no);
}

function getColor(industry) {
  if (industry.includes('製造') || industry.includes('メーカー') || industry.includes('衣料')) return '#e53935';
  if (industry.includes('保育') || industry.includes('幼稚') || industry.includes('福祉') || industry.includes('保育士')) return '#43a047';
  if (industry.includes('物流')) return '#fb8c00';
  if (industry.includes('食品') || industry.includes('飲食') || industry.includes('漬物') || industry.includes('和菓子')) return '#ff7043';
  if (industry.includes('美容')) return '#d81b60';
  return '#1e88e5';
}

// ===== Map =====
let map;
const markerData = [];
let currentDateFilter = '';

// 通学ルート表示用レイヤー（クリックごとにクリア）
let routeLayer = null;

function clearRoutes() {
  if (routeLayer) {
    routeLayer.clearLayers();
  }
}

function showRoutes(company, assigned) {
  if (!routeLayer) routeLayer = L.layerGroup().addTo(map);
  routeLayer.clearLayers();

  // 駅ごとに集計
  const stationMap = {};
  assigned.forEach(s => {
    if (!s.station) return;
    const coords = stationCoords[s.station];
    if (!coords) return;
    if (!stationMap[s.station]) stationMap[s.station] = { coords, students: [] };
    stationMap[s.station].students.push(s);
  });

  const compLatLng = [company.lat, company.lng];

  Object.entries(stationMap).forEach(([stName, info]) => {
    const stLatLng = info.coords;
    const count = info.students.length;

    // 直線
    L.polyline([stLatLng, compLatLng], {
      color: '#ff6f00',
      weight: 2,
      opacity: 0.7,
      dashArray: '6 4'
    }).addTo(routeLayer);

    // 駅マーカー（菱形っぽい正方形アイコン）
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:${10 + count * 3}px;height:${10 + count * 3}px;
        background:#ff6f00;border:2px solid #fff;
        border-radius:3px;transform:rotate(45deg);
        box-shadow:0 1px 4px rgba(0,0,0,.4);
      "></div>`,
      iconAnchor: [(10 + count * 3) / 2, (10 + count * 3) / 2]
    });
    const stMarker = L.marker(stLatLng, { icon }).addTo(routeLayer);

    const rows = info.students.map(s =>
      `<tr><td>${s.grade}年${s.cls}組${String(s.num).padStart(2,'0')}番</td><td>${s.gender||'-'}</td><td>${s.date}</td></tr>`
    ).join('');
    stMarker.bindTooltip(
      `<b>🚉 ${stName}</b>（${count}名）<br>
       <table style="font-size:.78rem;border-collapse:collapse;margin-top:4px">
         <tr><th style="padding:1px 5px">学年組番</th><th style="padding:1px 5px">性別</th><th style="padding:1px 5px">日付</th></tr>
         ${rows}
       </table>`,
      { sticky: true, opacity: 0.96 }
    );
  });
}

function initMap() {
  map = L.map('map').setView([35.330, 136.880], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 18
  }).addTo(map);

  // 地図クリックでルートをクリア
  map.on('click', clearRoutes);

  companies.forEach(c => {
    const assigned = matchStudents(c.no);
    const count = assigned.length;
    const color = getColor(c.industry);
    const dates = new Set(assigned.map(s => s.date));

    const marker = L.circleMarker([c.lat, c.lng], {
      radius: 8 + Math.min(count * 1.5, 12),
      fillColor: color,
      color: '#fff',
      weight: 2,
      fillOpacity: 0.88
    }).addTo(map);

    const studentRows = assigned.length > 0
      ? assigned.map(s => `<tr><td>${s.grade}年${s.cls}組${String(s.num).padStart(2,'0')}番</td><td>${s.gender||'-'}</td><td>${s.date}</td><td>${s.station||'-'}</td></tr>`).join('')
      : '<tr><td colspan="4" style="color:#aaa;text-align:center">生徒なし</td></tr>';

    const detailsHtml = count > 0
      ? `<details class="popup-students"><summary>配属生徒 ${count}名を見る</summary>
           <table><tr><th>学年組番</th><th>性別</th><th>日付</th><th>最寄り駅</th></tr>${studentRows}</table>
         </details>`
      : `<div style="color:#aaa;font-size:.8rem;margin-top:4px">配属生徒なし</div>`;

    marker.bindPopup(`
      <h3><span style="color:${color}">●</span> ${c.no}. ${c.name}</h3>
      <div class="popup-row"><span class="label">業種</span>${c.industry}</div>
      <div class="popup-row"><span class="label">住所</span>${c.address}</div>
      <div class="popup-row"><span class="label">連絡先</span>${c.contact}</div>
      ${detailsHtml}
      <a class="gmap-btn" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.address)}" target="_blank">🗺 Google Mapsで開く</a>
    `, { maxWidth: 360 });

    marker.on('click', () => showRoutes(c, assigned));

    markerData.push({ marker, dates, count, color, lat: c.lat, lng: c.lng });
  });

  // Build date filter buttons
  const allDates = [...new Set(students.map(s => s.date))].sort((a, b) => {
    const n = d => { const m = d.match(/(\d+)\/(\d+)/); return m ? parseInt(m[1]) * 100 + parseInt(m[2]) : 0; };
    return n(a) - n(b);
  });
  const bar = document.getElementById('map-filter');
  allDates.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'date-btn';
    btn.textContent = d;
    btn.onclick = () => filterMap(d);
    bar.insertBefore(btn, document.getElementById('map-info'));
  });

  // Legend
  const legend = L.control({ position: 'bottomright' });
  legend.onAdd = () => {
    const div = L.DomUtil.create('div', 'map-legend');
    div.innerHTML = `<h4>業種</h4>
      <div><span class="legend-dot" style="background:#e53935"></span>製造業</div>
      <div><span class="legend-dot" style="background:#43a047"></span>保育・幼稚園</div>
      <div><span class="legend-dot" style="background:#fb8c00"></span>物流業</div>
      <div><span class="legend-dot" style="background:#ff7043"></span>食品・飲食</div>
      <div><span class="legend-dot" style="background:#d81b60"></span>美容業</div>
      <div><span class="legend-dot" style="background:#1e88e5"></span>小売・その他</div>
      <div style="margin-top:6px;color:#888;font-size:.75rem">●サイズ＝配属人数</div>
      <div style="margin-top:4px;display:flex;align-items:center;gap:5px;color:#888;font-size:.75rem">
        <div style="width:10px;height:10px;background:#ff6f00;border-radius:2px;transform:rotate(45deg)"></div>
        クリックで最寄り駅表示
      </div>`;
    return div;
  };
  legend.addTo(map);
  filterMap('');
}

function filterMap(date) {
  currentDateFilter = date;
  clearRoutes();

  document.querySelectorAll('.date-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === (date || 'すべて'));
  });

  let visibleCount = 0;
  markerData.forEach(({ marker, dates, count }) => {
    const show = date === '' || dates.has(date);
    if (show) {
      if (!map.hasLayer(marker)) marker.addTo(map);
      visibleCount++;
    } else {
      if (map.hasLayer(marker)) map.removeLayer(marker);
    }
  });

  const sCount = date === ''
    ? students.length
    : students.filter(s => s.date === date).length;

  document.getElementById('map-info').textContent =
    `${visibleCount}事業所 / ${sCount}名`;
}

// ===== DB =====
function initDB() {
  const classes = [...new Set(students.map(s => `${s.grade}-${s.cls}`))].sort();
  const classSelect = document.getElementById('f-class');
  classes.forEach(c => {
    const [g, cl] = c.split('-');
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = `${g}年${cl}組`;
    classSelect.appendChild(opt);
  });
  const dates = [...new Set(students.map(s => s.date))].sort((a,b) => {
    const n = d => { const m = d.match(/(\d+)\/(\d+)/); return m ? parseInt(m[1])*100+parseInt(m[2]) : 0; };
    return n(a) - n(b);
  });
  const dateSelect = document.getElementById('f-date');
  dates.forEach(d => {
    const opt = document.createElement('option'); opt.value = d; opt.textContent = d;
    dateSelect.appendChild(opt);
  });
  renderTable(students);
}

function filterTable() {
  const grade = document.getElementById('f-grade').value;
  const cls = document.getElementById('f-class').value;
  const gender = document.getElementById('f-gender').value;
  const date = document.getElementById('f-date').value;
  const company = document.getElementById('f-company').value.trim();
  const filtered = students.filter(s => {
    if (grade && s.grade != grade) return false;
    if (cls && `${s.grade}-${s.cls}` !== cls) return false;
    if (gender && s.gender !== gender) return false;
    if (date && s.date !== date) return false;
    if (company && !s.company.includes(company)) return false;
    return true;
  });
  renderTable(filtered);
}

function renderTable(data) {
  const tbody = document.getElementById('student-tbody');
  tbody.innerHTML = '';
  data.forEach(s => {
    const tr = document.createElement('tr');
    const g = s.gender === '女' ? `<span class="badge badge-f">女</span>`
             : s.gender === '男' ? `<span class="badge badge-m">男</span>` : '-';
    tr.innerHTML = `<td>${s.grade}年生</td><td>${s.cls}組</td><td>${s.num}番</td><td>${g}</td><td>${s.company}</td><td>${s.date}</td><td>${s.station||'-'}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('count-badge').textContent = `${data.length}件`;
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='map')||(i===1&&tab==='db')));
  document.getElementById('tab-map').classList.toggle('active', tab==='map');
  document.getElementById('tab-db').classList.toggle('active', tab==='db');
  if (tab==='map' && map) map.invalidateSize();
}

initDB();
window.addEventListener('load', initMap);
</script>
